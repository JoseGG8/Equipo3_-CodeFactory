    image: postgres:15
    container_name: postgres_fabrica_escuela
    environment:
      POSTGRES_USER: JoseGG8
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: Gestion_Finanzas
    ports:
      - "5432:5432"
