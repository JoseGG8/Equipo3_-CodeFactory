spring.application.name=GestionFinanzas

# Render / Supabase: define en el panel SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Gestion_Finanzas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:JoseGG8}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

# Render inyecta PORT automáticamente
server.port=${PORT:8080}
